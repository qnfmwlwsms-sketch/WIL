
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리의 결혼식에 초대합니다</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>우리의 결혼식에 초대합니다</h1>
            <p class="date">2024년 10월 26일</p>
        </header>

        <section class="invitation">
            <h2>신랑 & 신부</h2>
            <p class="names">김철수 & 이영희</p>
            <p>서로의 가장 좋은 친구가 되기로 맹세합니다.</p>
            <p>저희의 첫 시작을 함께 축복해주세요.</p>
        </section>

        <section class="gallery">
            <h2>우리의 이야기</h2>
            <photo-gallery></photo-gallery>
        </section>

        <section class="details">
            <h2>오시는 길</h2>
            <p><strong>날짜:</strong> 2024년 10월 26일 토요일 오후 2시</p>
            <p><strong>장소:</strong> 서울특별시 강남구 웨딩팰리스</p>
        </section>

        <section class="contact">
            <h2>연락처</h2>
            <p>신랑: 010-1234-5678</p>
            <p>신부: 010-8765-4321</p>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
